<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CanadaFirst — v3 Prototype</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ================================================================
   DESIGN SYSTEM
   ================================================================ */
      :root {
        --red-800: #991b1b;
        --red-700: #b91c1c;
        --red-600: #dc2626;
        --red-500: #ef4444;
        --red-100: #fee2e2;
        --red-50: #fef2f2;
        --warm-50: #faf8f5;
        --warm-100: #f3efe8;
        --warm-200: #e8e0d4;
        --warm-300: #d4c8b8;
        --warm-400: #a89a8a;
        --warm-800: #3d3229;
        --warm-900: #2a231c;
        --green-800: #166534;
        --green-700: #15803d;
        --green-600: #16a34a;
        --green-100: #dcfce7;
        --green-50: #f0fdf4;
        --amber-700: #b45309;
        --amber-100: #fef3c7;
        --white: #ffffff;
        --font-display: "Fraunces", Georgia, serif;
        --font-body: "DM Sans", system-ui, sans-serif;
        --radius-sm: 8px;
        --radius-md: 14px;
        --radius-lg: 20px;
        --radius-full: 9999px;
        --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.06);
        --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.08);
        --shadow-popout:
          0 12px 40px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.05);
        --sidebar-w: 380px;
        --topbar-h: 42px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: var(--font-body);
        background: #d8d0c4;
        height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* ================================================================
   SHELL
   ================================================================ */
      .shell {
        width: 1220px;
        height: 710px;
        background: var(--white);
        border-radius: 14px;
        overflow: hidden;
        box-shadow:
          0 30px 90px rgba(0, 0, 0, 0.22),
          0 0 0 1px rgba(0, 0, 0, 0.06);
        display: flex;
        flex-direction: column;
      }
      .topbar {
        height: var(--topbar-h);
        background: #f5f5f5;
        border-bottom: 1px solid #e0e0e0;
        display: flex;
        align-items: center;
        padding: 0 14px;
        gap: 8px;
        flex-shrink: 0;
      }
      .dot {
        width: 11px;
        height: 11px;
        border-radius: 50%;
      }
      .dot.r {
        background: #ff5f57;
      }
      .dot.y {
        background: #ffbd2e;
      }
      .dot.g {
        background: #28c840;
      }
      .url-bar {
        flex: 1;
        margin-left: 10px;
        background: var(--white);
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        padding: 4px 12px;
        font-size: 12px;
        color: #666;
        display: flex;
        align-items: center;
        gap: 5px;
        user-select: none;
      }
      .url-bar .lock {
        color: #28c840;
        font-size: 10px;
      }
      .ext-icon {
        width: 28px;
        height: 28px;
        background: var(--red-600);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: transform 0.15s;
        position: relative;
        flex-shrink: 0;
      }
      .ext-icon:hover {
        transform: scale(1.08);
      }
      .ext-icon span {
        font-size: 15px;
      }
      .ext-badge-count {
        position: absolute;
        top: -4px;
        right: -4px;
        min-width: 16px;
        height: 16px;
        background: var(--red-600);
        color: white;
        font-size: 9px;
        font-weight: 700;
        border-radius: 99px;
        border: 2px solid #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 3px;
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .content-area {
        flex: 1;
        display: flex;
        overflow: hidden;
        position: relative;
      }

      /* ================================================================
   PAGE
   ================================================================ */
      .page {
        flex: 1;
        overflow-y: auto;
        background: var(--white);
        transition: margin-right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .page::-webkit-scrollbar {
        width: 6px;
      }
      .page::-webkit-scrollbar-thumb {
        background: #ddd;
        border-radius: 3px;
      }

      .page-nav {
        height: 46px;
        background: #131921;
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 16px;
      }
      .page-nav .logo-text {
        color: white;
        font-size: 20px;
        font-weight: 700;
        letter-spacing: -0.5px;
      }
      .page-nav .logo-text .ca {
        color: #ff9900;
        font-size: 12px;
      }
      .page-nav .search-fake {
        flex: 1;
        height: 30px;
        background: var(--white);
        border-radius: 6px;
        display: flex;
        align-items: center;
        padding: 0 10px;
        font-size: 12px;
        color: #999;
      }
      .page-nav .cart-icon {
        color: white;
        font-size: 20px;
        cursor: default;
      }
      .page-subnav {
        height: 34px;
        background: #232f3e;
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 16px;
      }
      .page-subnav a {
        color: #ddd;
        font-size: 12px;
        text-decoration: none;
        cursor: default;
      }

      .product-area {
        padding: 24px 28px;
      }
      .product-area h2 {
        font-family: var(--font-body);
        font-size: 14px;
        font-weight: 400;
        color: #555;
        margin-bottom: 18px;
      }
      .product-area h2 strong {
        color: #c45500;
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
      }

      .product-card {
        border: 1px solid #e8e8e8;
        border-radius: 10px;
        padding: 16px;
        background: var(--white);
        transition: box-shadow 0.2s;
        cursor: default;
        position: relative;
      }
      .product-card:hover {
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      }

      .pc-img {
        width: 100%;
        aspect-ratio: 1;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 52px;
        margin-bottom: 12px;
      }
      .pc-title {
        font-size: 13px;
        color: #0f1111;
        line-height: 1.4;
        margin-bottom: 6px;
        min-height: 36px;
      }
      .pc-brand {
        font-size: 11.5px;
        color: #888;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 4px;
      }
      .pc-rating {
        font-size: 12px;
        color: #de7921;
        margin-bottom: 4px;
      }
      .pc-price {
        font-size: 18px;
        font-weight: 600;
        color: #0f1111;
      }
      .pc-price .sym {
        font-size: 12px;
        vertical-align: top;
        line-height: 1.8;
      }
      .pc-price .cents {
        font-size: 12px;
        vertical-align: top;
        line-height: 1.8;
      }
      .pc-delivery {
        font-size: 11px;
        color: #565959;
        margin-top: 4px;
      }

      /* ================================================================
   TAGS — maple leaf + recommendation
   ================================================================ */

      /* ---------- Canadian maple tag ---------- */
      .tag-maple {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        font-size: 14px;
        cursor: pointer;
        border-radius: 5px;
        vertical-align: middle;
        position: relative;
        transition:
          transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
          background 0.15s;
        user-select: none;
        background: var(--green-50);
        border: 1px solid var(--green-100);
      }
      .tag-maple:hover {
        transform: scale(1.2);
        background: var(--green-100);
      }

      /* ---------- Recommendation tag ---------- */
      .tag-rec {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 2px 8px 2px 5px;
        font-size: 10.5px;
        font-weight: 600;
        color: var(--red-700);
        background: var(--red-50);
        border: 1px solid var(--red-100);
        border-radius: var(--radius-full);
        cursor: pointer;
        vertical-align: middle;
        white-space: nowrap;
        transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        user-select: none;
        letter-spacing: -0.1px;
      }
      .tag-rec:hover {
        background: var(--red-100);
        border-color: var(--red-500);
        transform: scale(1.05);
      }
      .tag-rec .tag-leaf {
        font-size: 11px;
      }

      /* Tag appear animation */
      @keyframes tagPop {
        0% {
          transform: scale(0);
          opacity: 0;
        }
        60% {
          transform: scale(1.15);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      .tag-animate {
        animation: tagPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      /* ================================================================
   POPOUT CARD (Canadian brands only)
   ================================================================ */
      .popout {
        position: absolute;
        z-index: 100;
        width: 300px;
        background: var(--white);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-popout);
        overflow: hidden;
        opacity: 0;
        transform: translateY(4px);
        pointer-events: none;
        transition:
          opacity 0.2s,
          transform 0.2s;
      }
      .popout.visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .popout-photos {
        display: grid;
        grid-template-columns: 1fr 1fr;
        height: 110px;
        overflow: hidden;
      }
      .popout-photo {
        width: 100%;
        height: 100%;
        object-fit: cover;
        background-size: cover;
        background-position: center;
      }
      .popout-photo.scenic {
        border-right: 1px solid var(--warm-100);
      }

      .popout-body {
        padding: 12px 14px;
      }
      .popout-flag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        font-weight: 600;
        color: var(--green-700);
        background: var(--green-50);
        padding: 2px 8px;
        border-radius: var(--radius-full);
        margin-bottom: 6px;
      }
      .popout-name {
        font-family: var(--font-display);
        font-size: 15px;
        font-weight: 600;
        color: var(--warm-900);
        margin-bottom: 2px;
      }
      .popout-loc {
        font-size: 11px;
        color: var(--warm-400);
        margin-bottom: 8px;
      }
      .popout-story {
        font-size: 12px;
        line-height: 1.55;
        color: var(--warm-800);
        margin-bottom: 10px;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .popout-cta {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
        font-weight: 600;
        color: var(--red-600);
        cursor: pointer;
        transition: color 0.15s;
        border: none;
        background: none;
        font-family: var(--font-body);
        padding: 0;
      }
      .popout-cta:hover {
        color: var(--red-800);
      }
      .popout-cta .arrow {
        transition: transform 0.15s;
      }
      .popout-cta:hover .arrow {
        transform: translateX(3px);
      }

      /* ================================================================
   SIDEBAR
   ================================================================ */
      .sidebar {
        width: var(--sidebar-w);
        background: var(--warm-50);
        border-left: 1px solid var(--warm-200);
        display: flex;
        flex-direction: column;
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        transform: translateX(100%);
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 50;
      }
      .sidebar.open {
        transform: translateX(0);
      }

      .sb-header {
        height: 50px;
        background: var(--white);
        border-bottom: 1px solid var(--warm-200);
        display: flex;
        align-items: center;
        padding: 0 14px;
        gap: 9px;
        flex-shrink: 0;
      }
      .sb-logo {
        width: 26px;
        height: 26px;
        background: var(--red-600);
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
      }
      .sb-name {
        font-family: var(--font-display);
        font-size: 15px;
        font-weight: 600;
        color: var(--warm-900);
      }
      .sb-close {
        margin-left: auto;
        width: 28px;
        height: 28px;
        border: none;
        background: var(--warm-100);
        border-radius: 6px;
        font-size: 16px;
        color: var(--warm-400);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
      }
      .sb-close:hover {
        background: var(--warm-200);
        color: var(--warm-800);
      }

      .sb-messages {
        flex: 1;
        overflow-y: auto;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        scroll-behavior: smooth;
      }
      .sb-messages::-webkit-scrollbar {
        width: 4px;
      }
      .sb-messages::-webkit-scrollbar-thumb {
        background: var(--warm-200);
        border-radius: 4px;
      }

      .sb-input-bar {
        padding: 10px 14px;
        background: var(--white);
        border-top: 1px solid var(--warm-200);
        display: flex;
        gap: 8px;
        flex-shrink: 0;
      }
      .sb-input-bar input {
        flex: 1;
        border: 1px solid var(--warm-200);
        border-radius: var(--radius-full);
        padding: 8px 14px;
        font-size: 12.5px;
        font-family: var(--font-body);
        color: var(--warm-900);
        outline: none;
        transition: border 0.2s;
      }
      .sb-input-bar input:focus {
        border-color: var(--red-500);
      }
      .sb-input-bar input::placeholder {
        color: var(--warm-300);
      }
      .sb-send {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        border: none;
        background: var(--red-600);
        color: white;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
        flex-shrink: 0;
      }
      .sb-send:hover {
        background: var(--red-700);
      }

      /* ---------- Sidebar message elements ---------- */
      .m {
        max-width: 94%;
        animation: fadeUp 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        opacity: 0;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .m.agent {
        align-self: flex-start;
      }
      .m.user {
        align-self: flex-end;
      }
      .m-bubble {
        padding: 10px 14px;
        border-radius: 14px;
        font-size: 13px;
        line-height: 1.55;
        color: var(--warm-900);
      }
      .m.agent .m-bubble {
        background: var(--white);
        border: 1px solid var(--warm-200);
        border-bottom-left-radius: 4px;
        box-shadow: var(--shadow-soft);
      }
      .m.user .m-bubble {
        background: var(--red-600);
        color: white;
        border-bottom-right-radius: 4px;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        border-radius: var(--radius-full);
        font-size: 12px;
        font-weight: 600;
      }
      .status-badge.canadian {
        background: var(--green-100);
        color: var(--green-700);
      }
      .status-badge.foreign {
        background: var(--amber-100);
        color: var(--amber-700);
      }

      .origin-card {
        background: var(--white);
        border: 1px solid var(--warm-200);
        border-radius: var(--radius-md);
        overflow: hidden;
        box-shadow: var(--shadow-card);
        animation: fadeUp 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        opacity: 0;
      }
      .oc-header {
        padding: 12px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .oc-flag {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
      }
      .oc-flag.ca {
        background: var(--green-100);
      }
      .oc-flag.foreign {
        background: var(--amber-100);
      }
      .oc-info .oc-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--warm-900);
      }
      .oc-info .oc-detail {
        font-size: 11.5px;
      }
      .oc-info .oc-detail.ca {
        color: var(--green-700);
      }
      .oc-info .oc-detail.foreign {
        color: var(--amber-700);
      }

      .cmp-card {
        background: var(--white);
        border: 1px solid var(--warm-200);
        border-radius: var(--radius-md);
        overflow: hidden;
        box-shadow: var(--shadow-card);
        animation: fadeUp 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        opacity: 0;
      }
      .cmp-title {
        padding: 10px 14px 6px;
        font-family: var(--font-display);
        font-size: 13px;
        font-weight: 600;
        color: var(--warm-900);
      }
      .cmp-cols {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      .cmp-col {
        padding: 10px 14px 14px;
      }
      .cmp-col:first-child {
        border-right: 1px solid var(--warm-100);
      }
      .cmp-col.ca-col {
        background: var(--green-50);
      }
      .cmp-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .cmp-col:first-child .cmp-label {
        color: var(--amber-700);
      }
      .cmp-col.ca-col .cmp-label {
        color: var(--green-700);
      }
      .cmp-pname {
        font-size: 12.5px;
        font-weight: 600;
        color: var(--warm-900);
        margin-bottom: 2px;
      }
      .cmp-pbrand {
        font-size: 11px;
        color: #999;
        margin-bottom: 8px;
      }
      .cmp-row {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        font-size: 11.5px;
        border-top: 1px solid var(--warm-100);
      }
      .cmp-row .l {
        color: #999;
      }
      .cmp-row .v {
        font-weight: 600;
        color: var(--warm-900);
      }
      .cmp-row .v.good {
        color: var(--green-700);
      }
      .cmp-note {
        margin: 8px 14px 12px;
        padding: 6px 10px;
        background: var(--green-50);
        border-radius: 6px;
        font-size: 11px;
        color: var(--green-700);
        text-align: center;
        font-weight: 500;
      }

      .story-sb {
        background: linear-gradient(135deg, var(--warm-50), #fff8f0);
        border: 1px solid var(--warm-200);
        border-radius: var(--radius-md);
        padding: 14px;
        box-shadow: var(--shadow-soft);
        animation: fadeUp 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        opacity: 0;
      }
      .story-sb .st-hd {
        font-family: var(--font-display);
        font-size: 13px;
        font-weight: 600;
        color: var(--warm-900);
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .story-sb .st-body {
        font-size: 12.5px;
        line-height: 1.6;
        color: var(--warm-800);
      }
      .story-sb .st-loc {
        margin-top: 8px;
        font-size: 11px;
        color: var(--red-700);
        font-weight: 500;
      }

      .qa {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        animation: fadeUp 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        opacity: 0;
      }
      .qa-btn {
        padding: 5px 11px;
        border-radius: var(--radius-full);
        border: 1px solid var(--warm-200);
        background: var(--white);
        font-size: 11.5px;
        color: var(--warm-800);
        cursor: pointer;
        font-family: var(--font-body);
        transition: all 0.12s;
      }
      .qa-btn:hover {
        border-color: var(--red-500);
        color: var(--red-600);
        background: var(--red-50);
      }

      .badge-card {
        background: linear-gradient(145deg, #fff 0%, #fff7f7 50%, #fff 100%);
        border: 2px solid var(--red-600);
        border-radius: var(--radius-lg);
        padding: 20px 16px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(127, 29, 29, 0.12);
        position: relative;
        overflow: hidden;
        animation: fadeUp 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        opacity: 0;
      }
      .badge-card .b-maple {
        font-size: 30px;
        margin-bottom: 6px;
        filter: drop-shadow(0 2px 4px rgba(185, 28, 28, 0.2));
      }

      let tagCount = 0;

      function injectTags() {
        document.getElementById("scanLine").style.display = "block";
        setTimeout(() => {
          const slots = document.querySelectorAll(".brand-slot");
          let delay = 0;
          slots.forEach((slot) => {
            const key = slot.dataset.brand;
            const data = BRANDS[key];
            if (!data) return;
            delay += 140;
            setTimeout(() => {
              if (data.canadian) {
                // Maple leaf tag
                const tag = document.createElement("span");
                tag.className = "tag-maple tag-animate";
                tag.textContent = "🍁";
                tag.dataset.brand = key;
                tag.addEventListener("mouseenter", (e) => showPopout(e, key));
                tag.addEventListener("mouseleave", () => scheduleHidePopout());
                tag.addEventListener("click", () => openSidebarFor(key));
                slot.parentNode.insertBefore(tag, slot.nextSibling);
              } else {
                // Dynamic recommendation tag
                const a = data.alt;
                const tag = document.createElement("span");
                tag.className = "tag-rec tag-animate";
                tag.innerHTML = `<span class="tag-leaf">🍁</span>${a.shortName}, ${a.province}`;
                tag.dataset.brand = key;
                tag.addEventListener("mouseenter", (e) => showPopout(e, key));
                tag.addEventListener("mouseleave", () => scheduleHidePopout());
                tag.addEventListener("click", () => openSidebarFor(key));

              tagCount++;
              updateBadge();
            }, delay);

      function showPopout(e, brandKey) {
        clearTimeout(popoutTimer);
        const data = BRANDS[brandKey];
        if (!data) return;
        activePopoutBrand = brandKey;

        // Position relative to contentArea, accounting for page scroll
        const contentArea = document.getElementById("contentArea");
        const pageEl = document.getElementById("page");
        const rect = e.target.getBoundingClientRect();
        const containerRect = contentArea.getBoundingClientRect();
        const tagX = rect.left - containerRect.left;
        const tagY = rect.top - containerRect.top;

        const popoutH = 290;
        const spaceBelow = containerRect.bottom - rect.bottom;
        let top;
        if (spaceBelow > popoutH + 20) {
          top = tagY + rect.height + 8;
        } else {
          top = tagY - popoutH - 8;
          if (top < 0) top = 10;
        }
        let left = tagX - 140;

          addHTML(`
      <div class="origin-card">
        <div class="oc-header">
          <div class="oc-flag foreign">${data.flag}</div>
          <div class="oc-info">
            <div class="oc-name">${brandKey}</div>
            <div class="oc-detail foreign">Not Canadian — ${data.owner}, ${data.hq}</div>
          </div>
        </div>
      </div>
    `);
          await sleep(400);

          const a = data.alt;
          addM(
            "agent",
            `<strong>${brandKey}</strong> is owned by ${data.owner}, based in ${data.hq}. But I've got a great Canadian alternative — <strong>${a.brand}</strong> from ${a.origin}! ${data.flag}→🇨🇦`,
          );
          addTyping();
          await sleep(1600);

          addHTML(`
      <div class="cmp-card">
        <div class="cmp-title">⚖️ Side-by-Side</div>
        <div class="cmp-cols">
          <div class="cmp-col">
            <div class="cmp-label">${data.flag} Current</div>
            <div class="cmp-pname">${brandKey}</div>
            <div class="cmp-pbrand">${data.owner}</div>
            <div class="cmp-row"><span class="l">Origin</span><span class="v">${data.hq}</span></div>
          </div>
          <div class="cmp-col ca-col">
            <div class="cmp-label">🍁 Canadian</div>
            <div class="cmp-pname">${a.name}</div>
            <div class="cmp-pbrand">${a.brand}</div>
            <div class="cmp-row"><span class="l">Price</span><span class="v good">${a.price}</span></div>
            <div class="cmp-row"><span class="l">Shipping</span><span class="v">${a.shipping}</span></div>
            <div class="cmp-row"><span class="l">Origin</span><span class="v good">${a.origin} 🇨🇦</span></div>
          </div>
        </div>
        <div class="cmp-note">💡 Support Canadian — switch to ${a.brand}!</div>
      </div>
    `);
          await sleep(500);

          addHTML(`
      <div class="story-sb">
        <div class="st-hd">📖 The ${a.brand} Story</div>
        <div class="st-body">${a.story}</div>
        <div class="st-loc">📍 ${a.storyLoc}</div>
      </div>
    `);
          await sleep(400);

          addHTML(`
      <div class="qa">
        <button class="qa-btn" onclick="handleQA('more','${brandKey}')">What else do they make?</button>
        <button class="qa-btn" onclick="handleQA('similar','${brandKey}')">Similar Canadian brands?</button>
        <button class="qa-btn" onclick="handleQA('local','${brandKey}')">Where to buy locally?</button>
      </div>
    `);
          await sleep(200);
          addHTML(
            `<button class="gen-badge" onclick="genBadge('${data.alt.brand}')">🍁 Generate "We Buy Canadian" Badge</button>`,
          );
        }
      }

      async function genBadge(brandName) {
        document.querySelectorAll(".gen-badge").forEach((b) => b.remove());
        addM("user", "Generate my badge!");
        addTyping();
        await sleep(1000);
        addM("agent", "Here's your badge — share it proudly! 🇨🇦");
        await sleep(200);
        addHTML(`
    <div class="badge-card">
      <div class="b-maple">🍁</div>
      <div class="b-title">We Buy Canadian</div>
      <div class="b-prod">${brandName}</div>
      <div class="b-line"></div>
    </div>
  `);
      }

      async function handleQA(action, brandKey) {
        document.querySelectorAll(".qa").forEach((q) => q.remove());
        const data = BRANDS[brandKey];
        if (!data || !data.alt) return;

        if (action === "more") {
          addM("user", `What else does ${data.alt.brand} make?`);
          addTyping();
          await sleep(1200);
          addM(
            "agent",
            `${data.alt.brand} has a great lineup! They offer several roast profiles and blends — check their website for the full collection. Most are available on Amazon.ca too. All roasted in ${data.alt.origin}. 🇨🇦`,
          );
        } else if (action === "similar") {
          addM("user", "Any similar Canadian brands?");
          addTyping();
          await sleep(1200);
          addM(
            "agent",
            `Here are more Canadian options:<br><br>☕ <strong>Kicking Horse</strong> — Invermere, BC<br>☕ <strong>Salt Spring Coffee</strong> — Salt Spring Island, BC<br>☕ <strong>Ethical Bean</strong> — Vancouver, BC<br>☕ <strong>Pilot Coffee</strong> — Toronto, ON<br>☕ <strong>Detour Coffee</strong> — Hamilton, ON<br><br>All roasted in Canada! 🍁`,
          );
        } else {
          addM("user", "Where can I buy locally?");
          addTyping();
          await sleep(1200);
          addM(
            "agent",
            `In the Vancouver area, find Canadian coffee at <strong>Save-On-Foods</strong>, <strong>Whole Foods</strong>, <strong>Choices Markets</strong>, and <strong>London Drugs</strong>. Most roasters also ship free across Canada! 📦`,
          );
        }
      }

      // Free text
      async function handleInput() {
        const text = sbInput.value.trim();
        if (!text) return;
        sbInput.value = "";
        addM("user", text);
        addTyping();
        await sleep(1200);
        const lower = text.toLowerCase();
        if (lower.includes("honey") || lower.includes("maple")) {
          addM(
            "agent",
            `For <strong>Canadian honey</strong>, try <strong>Billy Bee</strong> from Stoney Creek, Ontario — buzzing since 1956! 🐝 For <strong>maple syrup</strong>, <strong>Escuminac</strong> from Quebec is incredible. Want a comparison?`,
          );
        } else {
          addM(
            "agent",
            `Great question! In the demo I cover coffee brands on this page. Try clicking any 🍁 tag or recommendation tag to see the full flow. More categories coming soon! 🍁`,
          );
        }
      }
      document.getElementById("sbSend").addEventListener("click", handleInput);
      sbInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleInput();
      });

      // ================================================================
      // INIT
      // ================================================================
      window.addEventListener("load", () => {
        setTimeout(() => injectTags(), 700);
      });
    </script>
  </body>
</html>
